name: Deploy

# Dispara somente após o workflow de CI concluir com sucesso na main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # workflow_dispatch entra direto; workflow_run só passa se o CI deu sucesso.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.VPS_PROJECT_PATH }}"
            git fetch --all
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml run --rm api python manage.py migrate --noinput
            docker compose -f docker-compose.prod.yml run --rm api python manage.py collectstatic --noinput
            docker image prune -f
